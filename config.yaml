# Global Settings
project_name: "DataCore Board Assessment"
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# Data Paths
paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  final_dir: "data/final"
  cafef_output: "data/raw/cafef_board.parquet"

# Scraper Settings
scraping:
  delay_seconds: 2.0
  timeout: 20
  retries: 3
  test_mode: false       # Set to true to limit requests for testing
  test_limit: 5         # Number of tickers to scrape in test mode

