# Global Settings
project_name: "DataCore Board Assessment"
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# Data Paths
paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  final_dir: "data/final"
  cafef_output: "data/raw/cafef_board.parquet"
  vietstock_output: "data/raw/vietstock_board.parquet"
  golden_output: "data/final/board_golden.parquet"

# Scraper Settings
scraping:
  delay_seconds: 3.0    # Slightly increased for Vietstock safety
  timeout: 25
  retries: 3
  test_mode: false
  test_limit: 5       

